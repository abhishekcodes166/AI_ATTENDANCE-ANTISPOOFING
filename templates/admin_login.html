{% extends "base.html" %}
{% block title %}Admin Login — AI Attendance{% endblock %}
{% block content %}
<div style="max-width:420px;margin:8vh auto 0">
  <div style="text-align:center;margin-bottom:26px">
    <div style="width:64px;height:64px;border-radius:18px;background:var(--primary-grad);
                display:grid;place-items:center;font-size:30px;margin:0 auto 14px;
                box-shadow:0 10px 30px -8px #4f7cff99">🛡️</div>
    <h1 style="font-size:1.5rem">Administrator</h1>
    <p class="sub" style="margin-bottom:0">Train the AI model, manage students,
      subjects &amp; attendance</p>
  </div>
  <div class="card">
    {% if error %}<div class="alert err">{{ error }}</div>{% endif %}
    <form method="post">
      <label>Username</label><input name="username" required autofocus>
      <label>Password</label><input type="password" name="password" required>
      <button class="btn" type="submit" style="width:100%">Sign In</button>
    </form>
  </div>
  <p style="text-align:center;font-size:.84rem;color:var(--muted)">
    <a href="{{ url_for('login') }}" style="color:var(--muted);font-weight:700">← Student login</a>
  </p>
</div>
{% endblock %}
