{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:560px;margin:8vh auto 0;text-align:center">
  <div class="result-wrap" style="display:block;padding-top:4px">
    <div class="result-icon warn">!</div>
    <div class="result-title">{{ title }}</div>
    <div class="result-sub" style="margin-top:8px">{{ message }}</div>
  </div>
  <a class="btn" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</div>
{% endblock %}
